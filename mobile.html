<!doctype html>

<style>

<body>

<div class="stage">
  <div class="label-col">
    <h1>
      <span class="scr">version</span>
      Mobile

    <p>Optimisé pour iPhone (402×874). Touch targets minimum 44px. La vidéo VSL est en ratio portrait.</p>
    <a class="pill" href="index.html">Voir la version desktop &rarr;</a>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

const C = {
  green: '#54973e', greenDeep: '#4F7A30', greenDark: '#54973e',
  orange: '#f59d61', orangeDeep: '#E78A4F',

const fonts = {
  display: '"Salsa", cursive',
  sans: "'Mulish', Helvetica, Arial, Lucida, sans-serif",
  script: '"Sacramento", cursive',
  italic: '"Cormorant Garamond", serif',
};

function Logo({ small }) {
  const logoHeight = small ? 56 : 72;
  return (
    <img
      src="assets/images/pilates-nathalie-cadotte-logo.png"
      alt="Pilates Nathalie Cadotte"
      style={{
        height: logoHeight,
        width: 'auto',
        display: 'block',
        background: small ? 'transparent' : '#fff',
        borderRadius: small ? 0 : 8,
        padding: small ? 0 : '6px 10px',
      }}
    />
  );
}

function MobileFAQ({ q, a, open: defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div onClick={() => setOpen(!open)} style={{
      background: open ? '#fff' : C.grayCard,
      border: open ? `1px solid ${C.line}` : 'none',
      borderRadius: open ? 18 : 999,
      padding: open ? '16px 18px' : '14px 18px',
      cursor:'pointer', transition:'all .25s ease',
      boxShadow: open ? '0 4px 14px rgba(0,0,0,.05)' : 'none',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <span style={{fontWeight:600,fontSize:13,lineHeight:1.35}}>{q}</span>
        <span style={{
          width:22,height:22,borderRadius:'50%',
          border:`2px solid ${C.green}`,
          background: open ? C.green : 'transparent',
          color: open ? '#fff' : C.green,
          fontSize:13,fontWeight:700,
          display:'grid',placeItems:'center',flexShrink:0,
        }}>{open ? '−' : '+'}</span>
      </div>
      {open && <p style={{fontSize:13,color:C.inkSoft,lineHeight:1.55,margin:'12px 0 0'}}>{a}</p>}
    </div>
  );
}

          background:C.orange,color:'#fff',border:'none',
          padding:'9px 12px',borderRadius:999,
          fontFamily:fonts.sans,fontWeight:700,fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',

        position:'relative',
        background:C.greenDark,
        color:'#fff',padding:'28px 22px 32px',overflow:'hidden',

        <div style={{position:'relative',zIndex:2}}>

            display:'inline-flex',alignItems:'center',gap:8,
            background:'rgba(255,255,255,.12)',backdropFilter:'blur(10px)',

              border:'none',cursor:'pointer',display:'grid',placeItems:'center',

          <div style={{background:C.green,borderRadius:14,padding:'20px 22px',color:'#fff'}}>

          <div style={{border:`1px solid ${C.line}`,borderRadius:14,padding:'20px 22px'}}>
            <div style={{fontFamily:fonts.display,fontWeight:700,fontSize:28,color:C.green,lineHeight:1.08}}>Retour sur investissement</div>

            ['02','Oct 2026','Introduction aux appareils','Reformer, Tour, Barils · transitions · ajustements.','17 — 18 oct'],

              <h3 style={{fontFamily:fonts.display,fontWeight:700,fontSize:15,textTransform:'uppercase',lineHeight:1.2,margin:'0 0 8px',color:C.greenDeep}}>{title}</h3>
