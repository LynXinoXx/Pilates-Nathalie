<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

  .stage{
    min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;

  .label-col{

  }

    font-family:"Quicksand",sans-serif;font-weight:700;

    margin:0 0 20px;color:#2D2D2D;
  }

    display:inline-flex;align-items:center;gap:10px;
    background:#F5A06B;color:#fff;padding:14px 24px;border-radius:999px;
    font-weight:700;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;

  }

<body>

<div class="stage">
  <div class="label-col">
    <h1>
      <span class="scr">version</span>
      Mobile

    <span class="underline"></span>
    <p>La même landing page, repensée pour le téléphone : VSL plein écran, CTA fixe en bas, FAQ pliées par défaut, bandeau d'urgence compact.</p>
    <p>Optimisé pour iPhone (402×874). Touch targets minimum 44px. La vidéo VSL est en ratio portrait.</p>
    <a class="pill" href="index.html">Voir la version desktop &rarr;</a>
  </div>

  <div id="mobile-root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
const { useState } = React;

const C = {
  green: '#6B9E47', greenDeep: '#4F7A30', greenDark: '#3D5F26',

  cream: '#FAF8F4', grayCard: '#ECEBE8', line: '#E0DEDA',
  ink: '#2D2D2D', inkSoft: '#5A5A5A',

const fonts = {

  sans: '"Mulish", sans-serif',

  italic: '"Cormorant Garamond", serif',

function Logo({ small }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,lineHeight:1}}>
      <svg width={small?44:52} height={small?28:34} viewBox="0 0 64 42">
        <circle cx="6"  cy="14" r="2.2" fill="#9DBE3D"/>
        <circle cx="13" cy="9"  r="1.7" fill="#6B9E47"/>
        <circle cx="20" cy="7"  r="2"   fill="#4F7A30"/>
        <circle cx="28" cy="11" r="1.5" fill="#9DBE3D"/>
        <circle cx="34" cy="15" r="2.2" fill="#F2B044"/>
        <circle cx="42" cy="20" r="1.7" fill="#F5A06B"/>
        <circle cx="50" cy="22" r="1.5" fill="#6B9E47"/>
        <circle cx="58" cy="20" r="1.2" fill="#9DBE3D"/>

      <span style={{display:'flex',flexDirection:'column'}}>
        <span style={{fontFamily:fonts.script,fontSize:small?22:26,color:C.greenDeep,marginBottom:-3,lineHeight:0.9}}>Pilates</span>
        <span style={{fontFamily:fonts.display,fontWeight:500,fontSize:small?7:8,letterSpacing:'0.18em',textTransform:'uppercase',color:C.orangeDeep}}>Nathalie Cadotte</span>
      </span>
    </div>
  );
}

function MobileFAQ({ q, a, open: defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div onClick={() => setOpen(!open)} style={{
      background: open ? '#fff' : C.grayCard,
      border: open ? `1px solid ${C.line}` : 'none',
      borderRadius: open ? 18 : 999,
      padding: open ? '16px 18px' : '14px 18px',
      cursor:'pointer', transition:'all .25s ease',
      boxShadow: open ? '0 4px 14px rgba(0,0,0,.05)' : 'none',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <span style={{fontWeight:600,fontSize:13,lineHeight:1.35}}>{q}</span>
        <span style={{
          width:22,height:22,borderRadius:'50%',
          border:`2px solid ${C.green}`,
          background: open ? C.green : 'transparent',
          color: open ? '#fff' : C.green,
          fontSize:13,fontWeight:700,
          display:'grid',placeItems:'center',flexShrink:0,
        }}>{open ? '−' : '+'}</span>
      </div>
      {open && <p style={{fontSize:13,color:C.inkSoft,lineHeight:1.55,margin:'12px 0 0'}}>{a}</p>}
    </div>
  );
}

              <svg width={22} height={22} viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>

              position:'absolute',bottom:14,left:14,right:14,

            <div style={{fontSize:12.5,color:C.inkSoft,lineHeight:1.5,marginTop:8}}>De nos étudiants enseignent dès la fin du Module 3</div>
          </div>
        </div>
      </section>

      {/* Yellow callout */}
      <section style={{padding:'8px 22px 40px',background:'#fff'}}>
        <div style={{
          background:C.yellow,borderRadius:'24px 80px 24px 24px',
          padding:'34px 28px',color:'#fff',position:'relative',overflow:'hidden',
